name: Publish Docker Image to GHCR

on:
  # release-please 使用 GITHUB_TOKEN 创建的 tag 不会触发该 workflow。
  # release-please 发布镜像逻辑在 release-please.yml 内；这里保留给人工推 tag。
  push:
    tags:
      - 'v*'
  # 保留手动触发，用于紧急修复场景
  workflow_dispatch:
    inputs:
      tag:
        description: '可选：指定要发布的 release tag，例如 v1.3.1'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve image tags
        id: image
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }},enable=${{ startsWith(env.RELEASE_TAG, 'v') }}
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }},enable=${{ startsWith(env.RELEASE_TAG, 'v') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }},enable=${{ startsWith(env.RELEASE_TAG, 'v') }}
            type=raw,value=${{ steps.image.outputs.short_sha }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
